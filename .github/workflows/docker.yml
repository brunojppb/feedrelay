name: Release Docker image
on:
  workflow_dispatch:
    inputs:
      semver:
        description: "The SemVer value used by this release (e.g. 0.1.0)"
        type: string
        required: true

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  docker-release:
    name: Publish Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Need full history so the release step can diff PREV_TAG..NEW_TAG
          # in the commit log.
          fetch-depth: 0

      - name: Branch sanity check
        if: github.ref != 'refs/heads/main'
        run: |
          echo "Releases should only run from the main branch"
          exit 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.11.1

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        env:
          IMAGE_VERSION: ${{ github.event.inputs.semver }}
        run: |
          docker buildx build \
            --tag ghcr.io/brunojppb/feedrelay:$IMAGE_VERSION \
            --tag ghcr.io/brunojppb/feedrelay:latest \
            --platform linux/arm64,linux/amd64 \
            --push .

      - name: Tag the release commit
        env:
          IMAGE_VERSION: ${{ github.event.inputs.semver }}
        run: |
          git config --global user.name "${GITHUB_ACTOR}"
          git config --global user.email "${GITHUB_ACTOR}@users.noreply.github.com"
          git tag -a "$IMAGE_VERSION" -m "Release $IMAGE_VERSION"
          git push origin "$IMAGE_VERSION"

      - name: Create GitHub Release
        env:
          IMAGE_VERSION: ${{ github.event.inputs.semver }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREV_TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName // empty')

          NOTES_FILE=$(mktemp)
          echo "## What's Changed" > "$NOTES_FILE"
          echo "" >> "$NOTES_FILE"

          if [ -n "$PREV_TAG" ]; then
            git log "${PREV_TAG}..${IMAGE_VERSION}" \
              --pretty=format:"* %s (%h)" \
              --grep="^Release " --invert-grep >> "$NOTES_FILE"
            echo "" >> "$NOTES_FILE"
            echo "" >> "$NOTES_FILE"
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${IMAGE_VERSION}" >> "$NOTES_FILE"
          else
            git log "${IMAGE_VERSION}" \
              --pretty=format:"* %s (%h)" >> "$NOTES_FILE"
          fi

          gh release create "${IMAGE_VERSION}" \
            --title "${IMAGE_VERSION}" \
            --notes-file "$NOTES_FILE"

          rm -f "$NOTES_FILE"
